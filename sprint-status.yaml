    stories:
      ARCH.1: complete  # Extract processInbound() from HTTP handler
      ARCH.2: complete  # Refactor TelegramAdapter to in-process class
      ARCH.3: complete  # Wire adapter registration in bus-core index.ts
      ARCH.4: complete  # Implement DeliveryWorker (src/core/delivery.ts)
      ARCH.5: complete  # Remove Telegram outbound polling + simplify pm2
      ARCH.6: complete  # Update docs (DEPLOYMENT, TELEGRAM_ADAPTER, HTTP_API)
  E10:
    status: complete
    completed: 2026-04-13
    notes: >
      S10.1 (CapabilityChecker utility) skipped — inline checks in api.ts are
      sufficient at current scale. S10.2 (markRead) deferred to BlueBubbles
      (E4). S10.3 fully implemented for Telegram: persistent typing indicator
      loop (4s resend, 2-min timeout) started on inbound, stopped on send();
      react() implemented via sendReaction with platform_message_id encoded as
      "{chatId}:{messageId}" in inbound metadata.
    stories:
      S10.2: skipped  # markRead: Telegram doesn't support it; deferred to E4/BlueBubbles
      S10.3: complete  # react_to_message end-to-end (src/adapters/telegram.ts)
      S10.typing: complete  # Persistent typing loop in TelegramAdapter (src/adapters/telegram.ts)
  E6:
    status: complete
    completed: 2026-04-13
    notes: >
      7 built-in commands (subscribe deferred). Post-pipeline dispatch: slash
      commands intercept after Stage 80 so they're always logged to transcripts.
      Pause check is also post-pipeline so /resume works from paused adapters.
      Command responses logged with command_response:true metadata for E8 filtering.
      Plugin API: CommandRegistry.register() for custom commands. TelegramAdapter
      updated to accept dynamic CommandManifest[] from bus-core at startup.
    stories:
      S6.1: complete  # CommandRegistry (src/commands/registry.ts)
      S6.2: complete  # 7 built-in commands (src/commands/handlers.ts) — /subscribe deferred
      S6.3: complete  # Adapter command registration (TelegramAdapter.registerCommands())
  E8:
    status: complete
    completed: 2026-04-14
    notes: >
      S8.1 (TranscriptLogger) was already complete in Stage 80.
      Migration 003 adds sessions.status, sessions.summary_attempts, and memories table with FTS5.
      Summarizer calls Claude API (claude-sonnet-4-6 default) with JSON extraction prompt;
      retries 3x with exponential backoff; handles token budget guard (character heuristic).
      SessionTracker background task closes idle sessions, retries failed, sweeps expired memories.
      recall_memory + log_memory MCP tools now functional via GET/POST /api/v1/memories/*.
      /retry-summary command resets failed sessions for next tracker tick.
    stories:
      S8.1: complete  # TranscriptLogger (already implemented in Stage 80)
      S8.2: complete  # SessionTracker (src/memory/session-tracker.ts)
      S8.3: complete  # Summarizer Pipeline (src/memory/summarizer.ts)
      S8.4: complete  # Memory Lifecycle (migration 003 + HTTP endpoints + MCP tools)
  E14:
    status: backlog
    notes: >
      User authorization model for slash commands. Currently any user on any
      adapter can run any command (/pause, /forget, /replay). Need per-command
      permission checks based on sender identity. /replay should scope
      transcripts to the requesting contact's own sessions.
    stories:
      S14.1: pending  # Define permission model (admin vs user roles)
      S14.2: pending  # Add authorization check to command dispatch in api.ts
      S14.3: pending  # Scope /replay and /sessions to requesting contact
      S14.4: pending  # Scope /forget to own contact unless admin
  E15:
    status: backlog
    notes: >
      Temporary/incognito chat mode. A slash command (e.g. /temp or /incognito)
      starts a fresh session that is excluded from memory summarization and context
      injection. The session is still logged to transcripts for auditability but
      E8/E9 skip it entirely — no memories are created, and the temp session's
      history is not included in future context windows. Session ends on explicit
      /end or idle timeout. Useful for sensitive conversations or testing agent
      behavior without polluting long-term memory.
    stories:
      S15.1: pending  # Add /temp slash command that creates a new session with temp=true flag
      S15.2: pending  # E8 memory summarizer skips sessions with temp=true
      S15.3: pending  # E9 context injection excludes temp sessions from context window
      S15.4: pending  # /end command (or idle timeout) to explicitly close temp session
  E16:
    status: backlog
    notes: >
      Link AgentBus sessions to native Claude Code sessions. When the CC adapter
      receives a message, capture the active Claude Code session ID (e.g. from
      MCP context or a handshake tool call) and store it in sessions.cc_session_id.
      Enables cross-referencing: given a bus session you can find the CC session
      that handled it, and vice versa. Unlocks future features like session
      continuity (resume a bus conversation in the same CC session), transcript
      merging, and per-session tool-call attribution.
    stories:
      S16.1: pending  # Add cc_session_id column to sessions table (migration)
      S16.2: pending  # CC adapter reports its session ID via a new MCP tool or handshake
      S16.3: pending  # bus-core stores cc_session_id when session is created/updated
      S16.4: pending  # Expose cc_session_id in /sessions output and get_session MCP tool
  E17:
    status: backlog
    notes: >
      End-to-end image and file attachment support. Telegram messages containing
      photo/document/video/audio are currently silently dropped. E17 adds an
      'attachment' payload type, a new attachments table (migration), Telegram
      adapter media capture with Bot API file resolution, pipeline/DB persistence,
      and CC adapter vision forwarding (base64 inline for images ≤5 MB, URL
      fallback otherwise). Outbound attachment sending deferred to E18.
      BlueBubbles attachments deferred to when E4 is implemented.
    stories:
      S17.1: pending  # attachment payload type + DB migration (attachments table, transcripts.attachment_id)
      S17.2: pending  # Telegram adapter: detect photo/document/video/audio, resolve via getFile, emit attachment envelope
      S17.3: pending  # Pipeline + TranscriptLogger: persist attachment rows alongside transcript rows
      S17.4: pending  # CC adapter: forward images as base64 content blocks, non-image as text description
last_updated: 2026-04-14  # E8 complete
